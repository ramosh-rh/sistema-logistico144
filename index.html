<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Controle de Café</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 2px solid #ff9800; position: relative; }
        
        h1 { color: #ff9800; }
        #clock { font-size: 3em; font-weight: bold; margin-bottom: 20px; color: #00e676; }
        
        /* Botões */
        .botoes-topo { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .btn-editar, .btn-teste { color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-editar { background: #444; }
        .btn-editar:hover { background: #ff9800; color: #121212; }
        .btn-teste { background: #2196F3; }
        .btn-teste:hover { background: #0b7dda; }

        /* Tela Inicial de Desbloqueio de Som */
        #tela-inicial { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 60vh; }
        .btn-iniciar-gigante { background: #00e676; color: #121212; font-size: 2em; font-weight: bold; padding: 20px 40px; border: none; border-radius: 15px; cursor: pointer; animation: pulse 1.5s infinite; text-transform: uppercase; }
        .btn-iniciar-gigante:hover { background: #00c853; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #painel-principal { display: none; /* Fica escondido até clicar no botão */ }

        /* Estilo do Boneco Logístico */
        .mascote-container { height: 150px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .boneco { font-size: 80px; transition: transform 0.3s; animation: swing 2s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .alert-mode { animation: shake 0.5s infinite; color: #f44336; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 100% { transform: translate(1px, -1px); } }

        /* Painel Status */
        .status-card { background: #333; padding: 20px; border-radius: 10px; min-height: 150px; border-left: 10px solid #ff9800; }
        
        .nomes { font-size: 1.6em; color: #ffeb3b; font-weight: 900; text-transform: uppercase; margin-top: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .aviso { font-size: 2em; color: #f44336; font-weight: bold; display: none; margin-top: 15px; text-transform: uppercase; animation: shake 0.5s infinite; }
        
        /* Tabela */
        .tabela-grupos { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 1em; }
        .tabela-grupos th, .tabela-grupos td { border-bottom: 1px solid #444; padding: 12px; text-align: left; }
        .active-row { background-color: #388e3c !important; border-left: 5px solid #00e676; }
        .nome-tabela { color: #ffeb3b; font-weight: bold; }

        /* Modal Edição */
        #modal-edicao { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid #ff9800; width: 90%; max-width: 600px; text-align: left; max-height: 80vh; overflow-y: auto; }
        .modal-content h2 { color: #ff9800; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: #bbb; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #333; color: white; font-size: 1em; }
        .btn-salvar { width: 100%; background: #00e676; color: #121212; border: none; padding: 15px; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-salvar:hover { background: #00c853; }
        .btn-fechar { background: #f44336; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; float: right; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="tela-inicial">
    <h1>Controle de Pausas - Operação</h1>
    <p style="color: #bbb; font-size: 1.2em; margin-bottom: 30px;">Para que os alertas sonoros funcionem, clique no botão abaixo para ligar o sistema.</p>
    <button class="btn-iniciar-gigante" onclick="iniciarPainel()">🔊 Ligar Painel e Som</button>
</div>

<div class="container" id="painel-principal">
    <div class="botoes-topo">
        <button class="btn-teste" onclick="testarTransicão()">🧪 Testar Alarme</button>
        <button class="btn-editar" onclick="abrirModal()">⚙️ Editar Equipes</button>
    </div>
    
    <h1>Controle de Café - Logística</h1>
    <div id="clock">00:00:00</div>

    <div class="mascote-container">
        <div id="boneco" class="boneco">📦</div>
    </div>

    <div class="status-card">
        <div id="status-label" style="color: #bbb; font-size: 1.2em;">Status Atual:</div>
        <div id="grupo-nome" class="nomes">Aguardando...</div>
        <div id="alerta-saida" class="aviso">⚠️ POR FAVOR, SE RETIRAR! O TEMPO ACABOU ⚠️</div>
    </div>

    <table class="tabela-grupos">
        <thead>
            <tr><th style="width: 20%;">Horário</th><th>Equipe</th></tr>
        </thead>
        <tbody id="lista-corpo"></tbody>
    </table>
</div>

<div id="modal-edicao">
    <div class="modal-content">
        <button class="btn-fechar" onclick="fecharModal()">X Fechar</button>
        <h2>Editar Equipes</h2>
        <div id="form-edicao"></div>
        <button class="btn-salvar" onclick="salvarEdicao()">💾 Salvar</button>
    </div>
</div>

<script>
    let grupos = [
        { hora: "02:00", nomes: "Kesia, Juliane, Yasmim, Natalia e Karen" },
        { hora: "02:10", nomes: "Juliana, Angelica, Maria Eduarda, Deborah, Diego" },
        { hora: "02:20", nomes: "Bruno, Maria Da Guia, Ana Paula, Darlan" },
        { hora: "02:30", nomes: "Guilherme, Giovanna, Michely, Willian Bento" },
        { hora: "02:40", nomes: "Willian, Dayna, Maria Luiza, Andressa, Rodrigo Melo" },
        { hora: "02:50", nomes: "Luciene, Erika, Denise, Jessica" },
        { hora: "03:00", nomes: "Giselle, Leila, Marcos Felipe, Paulo Vitor, Ana, Lorraine" },
        { hora: "03:10", nomes: "Brandon, Ezequiel, Nicson" },
        { hora: "03:20", nomes: "Bruno Coelho, Bruno Lorran" },
        { hora: "03:30", nomes: "Luan, Luca, Geovana" }
    ];

    let emModoTeste = false;
    let audioCtx;

    // Função que cria o som do zero (Não precisa de internet)
    function tocarBipe() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square'; // Tipo de onda (som de alarme digital)
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); // Frequência do bipe
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); // Volume (0.0 a 1.0)
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3); // Duração do bipe (0.3 segundos)
    }

    function iniciarPainel() {
        // Inicializa o motor de áudio do navegador na hora do clique
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        document.getElementById('tela-inicial').style.display = 'none';
        document.getElementById('painel-principal').style.display = 'block';
        
        popularTabela();
        atualizarSistema();
        setInterval(atualizarSistema, 1000); // Roda a cada segundo
    }

    function popularTabela() {
        const corpo = document.getElementById('lista-corpo');
        corpo.innerHTML = ''; 
        grupos.forEach((g, index) => {
            corpo.innerHTML += `<tr id="tr-${index}"><td><strong>${g.hora}</strong></td><td class="nome-tabela">${g.nomes}</td></tr>`;
        });
    }

    function abrirModal() {
        const formDiv = document.getElementById('form-edicao');
        formDiv.innerHTML = '';
        grupos.forEach((g, index) => {
            formDiv.innerHTML += `<div class="input-group"><label>Horário ${g.hora}:</label><input type="text" id="edit-nome-${index}" value="${g.nomes}"></div>`;
        });
        document.getElementById('modal-edicao').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-edicao').style.display = 'none'; }

    function salvarEdicao() {
        grupos.forEach((g, index) => { g.nomes = document.getElementById(`edit-nome-${index}`).value; });
        popularTabela(); fecharModal(); atualizarSistema(); 
    }

    function testarTransicão() {
        if (emModoTeste) return; 
        emModoTeste = true;

        const boneco = document.getElementById('boneco');
        const alertaSaida = document.getElementById('alerta-saida');
        const grupoNome = document.getElementById('grupo-nome');

        // ETAPA 1: O tempo acabou! Toca som
        grupoNome.innerText = "SIMULAÇÃO: TEMPO ACABOU!";
        alertaSaida.style.display = "block";
        boneco.classList.add('alert-mode');
        boneco.innerText = "🙅‍♂️"; 
        
        // Simula o alarme tocando várias vezes seguidas
        tocarBipe();
        setTimeout(tocarBipe, 500);
        setTimeout(tocarBipe, 1000);

        // ETAPA 2: Após 5 segundos
        setTimeout(() => {
            alertaSaida.style.display = "none";
            boneco.classList.remove('alert-mode');
            grupoNome.innerText = "SIMULAÇÃO: PRÓXIMA EQUIPE ENTRANDO...";
            boneco.innerText = "🚶‍♂️➡️☕"; 
            
            // Volta ao normal
            setTimeout(() => { emModoTeste = false; atualizarSistema(); }, 4000);
        }, 5000);
    }

    function atualizarSistema() {
        if (emModoTeste) return; 

        const agora = new Date();
        document.getElementById('clock').innerText = agora.toLocaleTimeString();

        let alguemNoCafe = false;
        const boneco = document.getElementById('boneco');
        const alertaSaida = document.getElementById('alerta-saida');

        grupos.forEach((g, index) => {
            const linha = document.getElementById(`tr-${index}`);
            const [h, m] = g.hora.split(':').map(Number);
            const inicio = h * 60 + m;
            const fim = inicio + 10;
            const agoraMinutos = agora.getHours() * 60 + agora.getMinutes();

            if (agoraMinutos >= inicio && agoraMinutos < fim) {
                alguemNoCafe = true;
                document.getElementById('grupo-nome').innerText = g.nomes; 
                if (linha) linha.classList.add('active-row');
                
                // NO ÚLTIMO MINUTO: Boneco avisa e toca o bipe a cada 2 segundos
                if (agoraMinutos === fim - 1) {
                    alertaSaida.style.display = "block";
                    boneco.classList.add('alert-mode');
                    boneco.innerText = "🙅‍♂️"; 
                    if (agora.getSeconds() % 2 === 0) tocarBipe(); // Toca o som nativo
                } 
                // PRIMEIRO MINUTO (Transição):
                else if (agoraMinutos === inicio && agora.getSeconds() < 15) {
                    alertaSaida.style.display = "none";
                    boneco.classList.remove('alert-mode');
                    boneco.innerText = "🚶‍♂️➡️☕"; 
                } 
                // RESTO DO TEMPO:
                else {
                    alertaSaida.style.display = "none";
                    boneco.classList.remove('alert-mode');
                    boneco.innerText = "☕"; 
                }
            } else {
                if (linha) linha.classList.remove('active-row');
            }
        });

        if (!alguemNoCafe) {
            document.getElementById('grupo-nome').innerText = "NENHUMA EQUIPE NO CAFÉ";
            boneco.innerText = "📦";
            alertaSaida.style.display = "none";
            boneco.classList.remove('alert-mode');
        }
    }
</script>

</body>
</html>
